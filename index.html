<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>7 TO 7</title>
    <link rel="stylesheet" href="index.css" />
    <script src="index.js" defer></script>
  </head>
  <body>
    <div class="header">
      <img class="logo" src="icons/logo1.png" alt="7 TO 7 Logo" />
      <button class="buttons">NEW ARRIVALS</button>
      <button class="buttons">WOMEN</button>
      <button class="buttons">MEN</button>
      <button class="buttons">COLLECTION</button>
      <button class="buttons about-btn">ABOUT US</button>
      <div class="search-container">
        <input class="search-bar" type="text" placeholder="Search products" />
        <button class="search-button">
          <img
            class="search-icon icon-search"
            src="icons/search-icon.png"
            alt="Search Icon"
          />
        </button>
      </div>
      <img
        class="cart-icon icon-cart"
        src="icons/cart-icon.png"
        alt="Cart Icon"
      />
    </div>
    <!-- container used by script to swap content -->
    <div id="content">
      <div class="search-results"></div>
      <section class="section1">
        <div class="democlothes" id="section1-products"></div>
      </section>
      <section class="section2">
        <div class="democlothes" id="section2-products"></div>
      </section>
    </div>
    <!-- end #content -->
    <!-- Cart Tab -->
    <div class="cart-tab">
      <h1 class="cart-head">Shopping Cart</h1>
      <div class="cart-items"></div>
      <div class="cart-buttons">
        <button class="close-btn close">CLOSE</button>
        <button class="checkout-btn checkout">CHECKOUT</button>
      </div>
    </div>
  </body>
</html>
